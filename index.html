<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tool AI Tài Xỉu Go88 VIP</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial Black', sans-serif;
      background: linear-gradient(to bottom, #000000, #1a1a1a);
      color: #f0c430;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 32px;
      color: #ffcc00;
      text-shadow: 0 0 5px #fff000, 0 0 10px #ffaa00;
    }
    .input-container, .result, .history, .log {
      margin: 20px auto;
      max-width: 520px;
      padding: 20px;
      border: 2px solid #ffaa00;
      border-radius: 10px;
      background: #111;
      box-shadow: 0 0 15px #ffaa00;
    }
    input[type="text"] {
      width: 90%;
      padding: 10px;
      font-size: 16px;
      background: #222;
      border: 1px solid #ffaa00;
      border-radius: 5px;
      color: #fff;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      margin-top: 10px;
      background-color: #ffaa00;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .result {
      font-size: 20px;
      color: #00ffcc;
    }
    .highlight {
      font-size: 28px;
      color: #00ff00;
      font-weight: bold;
      text-shadow: 0 0 8px #00ffcc;
    }
    .highlight-keo {
      font-size: 26px;
      color: #ff1493;
      font-weight: bold;
      text-shadow: 0 0 8px #ff69b4;
    }
    .history {
      font-size: 16px;
      color: #ccc;
    }
    .log {
      font-size: 14px;
      color: #bbb;
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>🎲 Tool AI Tài Xỉu Go88 VIP (Full Nâng Cấp + Kéo 1-1)</h1>
  <div class="input-container">
    <p><strong>Nhập kết quả 15 phiên gần nhất:</strong></p>
    <p style="font-size:14px;">(Nhập số tổng từng phiên, cách nhau bằng dấu phẩy)</p>
    <input type="text" id="historyInput" placeholder="VD: 9,7,11,12,5,7,10,11,9,9,17,16,12,15,..." />
    <br/>
    <button onclick="analyze()">Phân Tích & Dự Đoán</button>
  </div>

  <div class="result" id="result"></div>
  <div class="history" id="patternOutput"></div>
  <div class="log" id="historyLog"><strong>📅 Lịch sử dự đoán hôm nay:</strong><br/></div>

  <script>
    let logData = [];

    function speak(text) {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'vi-VN';
      msg.rate = 1;
      window.speechSynthesis.speak(msg);
    }

    function analyze() {
      const input = document.getElementById("historyInput").value.trim();
      const raw = input.split(",").map(x => parseInt(x));
      if (raw.length < 10) {
        alert("Vui lòng nhập ít nhất 10 phiên!");
        return;
      }

      const labels = raw.map(x => x >= 11 ? "Tài" : "Xỉu");
      let patterns = "";
      let keo11Count = 0;
      let keo11Type = "";
      
      for (let i = 2; i < labels.length; i++) {
        const slice = labels.slice(i - 2, i + 1).join("-");
        if (slice === "Tài-Tài-Xỉu") patterns += `🔁 Cầu 2-1 Tài tại phiên ${i + 1}<br>`;
        if (slice === "Xỉu-Xỉu-Tài") patterns += `🔁 Cầu 2-1 Xỉu tại phiên ${i + 1}<br>`;
        if (slice === "Tài-Tài-Tài") patterns += `💪 Cầu bền Tài tại phiên ${i + 1}<br>`;
        if (slice === "Xỉu-Xỉu-Xỉu") patterns += `💪 Cầu bền Xỉu tại phiên ${i + 1}<br>`;
        
        // Phát hiện kéo 1-1
        if (slice === "Tài-Xỉu-Tài" || slice === "Xỉu-Tài-Xỉu") {
          keo11Type = slice === "Tài-Xỉu-Tài" ? "Tài-Xỉu-Tài" : "Xỉu-Tài-Xỉu";
          keo11Count++;
          patterns += `🎯 KÉO 1-1: ${slice} tại phiên ${i + 1}<br>`;
        }
      }

      let last3 = labels.slice(-3).join("-");
      let prediction = "Xỉu";
      let confidence = 60;
      let isKeo11 = false;

      // Kiểm tra nếu đang kéo 1-1
      if (last3 === "Tài-Xỉu-Tài") {
        prediction = "Xỉu"; confidence = 82;
        isKeo11 = true;
      } else if (last3 === "Xỉu-Tài-Xỉu") {
        prediction = "Tài"; confidence = 82;
        isKeo11 = true;
      } else if (last3 === "Tài-Tài-Tài") {
        prediction = "Xỉu"; confidence = 88;
      } else if (last3 === "Xỉu-Xỉu-Xỉu") {
        prediction = "Tài"; confidence = 85;
      } else if (last3 === "Tài-Tài-Xỉu") {
        prediction = "Tài"; confidence = 75;
      } else if (last3 === "Xỉu-Xỉu-Tài") {
        prediction = "Xỉu"; confidence = 70;
      }

      speak(prediction);

      let resultHTML = `
        🤖 Dự đoán phiên tiếp theo: <span class="highlight">${prediction}</span><br>
        🎯 Độ tin cậy: <strong>${confidence}%</strong>
      `;
      
      if (isKeo11) {
        resultHTML += `<br><span class="highlight-keo">💗 ĐANG KÉO 1-1! Chọn ${prediction}</span>`;
      }

      document.getElementById("result").innerHTML = resultHTML;
      document.getElementById("patternOutput").innerHTML = `<hr><strong>📊 Phân tích cầu:</strong><br>${patterns}`;

      const time = new Date().toLocaleTimeString();
      const keoNote = isKeo11 ? " [KÉO 1-1]" : "";
      logData.unshift(`[${time}] Dự đoán: ${prediction} (${confidence}%)${keoNote}`);
      document.getElementById("historyLog").innerHTML = "<strong>📅 Lịch sử dự đoán hôm nay:</strong><br>" + logData.join("<br>");
    }
  </script>
</body>
</html>
